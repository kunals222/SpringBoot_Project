spring.application.name=spring_demo_project
# Server
server.port=8080

# MySQL Connection
spring.datasource.url=jdbc:mysql://localhost:3306/auth_system_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=yourpassword
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT (we'll use these in Phase 10)
jwt.secret=replace_this_with_a_long_random_secret_key_later
jwt.expiration=900000
jwt.refresh-expiration=604800000